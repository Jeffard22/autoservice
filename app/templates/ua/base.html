<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}AUTO SERVICE{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon"
          type="image/jpg"
          href="{{ url_for('static', filename='img/favicon.jpg') }}">

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/ua">
      AUTO<span>SERVICE</span>
    </a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/ua">Головна</a></li>
        <li class="nav-item"><a class="nav-link" href="/ua/mobile-service">Виїзний сервіс</a></li>
        <li class="nav-item"><a class="nav-link" href="/ua/chiptuning">Чіп-тюнінг</a></li>
      </ul>
    </div>
  </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="text-center">
    <div class="container">
        <p>© AUTO SERVICE • Київ та область</p>
    </div>
</footer>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
